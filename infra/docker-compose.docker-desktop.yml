services:
  postgres:
    image: postgres:17
    container_name: basicbanking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banking_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-basic_banking}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banking} -d ${POSTGRES_DB:-basic_banking}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: basicbanking-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-banking}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-banking_dev_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  customer-service:
    build:
      context: ..
      dockerfile: src/Banking.Services.Customer/Dockerfile
    container_name: basicbanking-customer
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-basic_banking};Username=${POSTGRES_USER:-banking};Password=${POSTGRES_PASSWORD:-banking_dev_password}
      Security__Authentication__ExternalApiKeys__0__Name: local-dev-client
      Security__Authentication__ExternalApiKeys__0__ApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
      Security__Authentication__InternalServices__0__Name: account-service
      Security__Authentication__InternalServices__0__ApiKey: ${ACCOUNT_SERVICE_API_KEY:-account-service-dev-key}
      Security__Authentication__InternalServices__1__Name: deposit-service
      Security__Authentication__InternalServices__1__ApiKey: ${DEPOSIT_SERVICE_API_KEY:-deposit-service-dev-key}
      Security__Authentication__InternalServices__2__Name: gateway-service
      Security__Authentication__InternalServices__2__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
      Security__CurrentServiceIdentity__ServiceName: customer-service
      Security__CurrentServiceIdentity__ApiKey: ${CUSTOMER_SERVICE_API_KEY:-customer-service-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CUSTOMER_SERVICE_PORT:-5101}:8080"

  account-service:
    build:
      context: ..
      dockerfile: src/Banking.Services.Account/Dockerfile
    container_name: basicbanking-account
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-basic_banking};Username=${POSTGRES_USER:-banking};Password=${POSTGRES_PASSWORD:-banking_dev_password}
      Infrastructure__CustomerService__BaseUrl: http://customer-service:8080/
      Security__Authentication__ExternalApiKeys__0__Name: local-dev-client
      Security__Authentication__ExternalApiKeys__0__ApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
      Security__Authentication__InternalServices__0__Name: deposit-service
      Security__Authentication__InternalServices__0__ApiKey: ${DEPOSIT_SERVICE_API_KEY:-deposit-service-dev-key}
      Security__Authentication__InternalServices__1__Name: customer-service
      Security__Authentication__InternalServices__1__ApiKey: ${CUSTOMER_SERVICE_API_KEY:-customer-service-dev-key}
      Security__Authentication__InternalServices__2__Name: gateway-service
      Security__Authentication__InternalServices__2__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
      Security__CurrentServiceIdentity__ServiceName: account-service
      Security__CurrentServiceIdentity__ApiKey: ${ACCOUNT_SERVICE_API_KEY:-account-service-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
      customer-service:
        condition: service_started
    ports:
      - "${ACCOUNT_SERVICE_PORT:-5102}:8080"

  audit-service:
    build:
      context: ..
      dockerfile: src/Banking.Services.Audit/Dockerfile
    container_name: basicbanking-audit
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-basic_banking};Username=${POSTGRES_USER:-banking};Password=${POSTGRES_PASSWORD:-banking_dev_password}
      Security__Authentication__ExternalApiKeys__0__Name: local-dev-client
      Security__Authentication__ExternalApiKeys__0__ApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
      Security__Authentication__InternalServices__0__Name: deposit-service
      Security__Authentication__InternalServices__0__ApiKey: ${DEPOSIT_SERVICE_API_KEY:-deposit-service-dev-key}
      Security__Authentication__InternalServices__1__Name: gateway-service
      Security__Authentication__InternalServices__1__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
      Security__CurrentServiceIdentity__ServiceName: audit-service
      Security__CurrentServiceIdentity__ApiKey: ${AUDIT_SERVICE_API_KEY:-audit-service-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUDIT_SERVICE_PORT:-5104}:8080"

  deposit-service:
    build:
      context: ..
      dockerfile: src/Banking.Services.Deposit/Dockerfile
    container_name: basicbanking-deposit
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-basic_banking};Username=${POSTGRES_USER:-banking};Password=${POSTGRES_PASSWORD:-banking_dev_password}
      Infrastructure__RabbitMq__Transport: RabbitMq
      Infrastructure__RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER:-banking}:${RABBITMQ_DEFAULT_PASS:-banking_dev_password}@rabbitmq:5672
      Infrastructure__AuditService__BaseUrl: http://audit-service:8080/
      Infrastructure__AccountService__BaseUrl: http://account-service:8080/
      Security__Authentication__ExternalApiKeys__0__Name: local-dev-client
      Security__Authentication__ExternalApiKeys__0__ApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
      Security__Authentication__InternalServices__0__Name: account-service
      Security__Authentication__InternalServices__0__ApiKey: ${ACCOUNT_SERVICE_API_KEY:-account-service-dev-key}
      Security__Authentication__InternalServices__1__Name: deposit-service
      Security__Authentication__InternalServices__1__ApiKey: ${DEPOSIT_SERVICE_API_KEY:-deposit-service-dev-key}
      Security__Authentication__InternalServices__2__Name: gateway-service
      Security__Authentication__InternalServices__2__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
      Security__CurrentServiceIdentity__ServiceName: deposit-service
      Security__CurrentServiceIdentity__ApiKey: ${DEPOSIT_SERVICE_API_KEY:-deposit-service-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      account-service:
        condition: service_started
      audit-service:
        condition: service_started
    ports:
      - "${DEPOSIT_SERVICE_PORT:-5103}:8080"

  gateway-service:
    build:
      context: ..
      dockerfile: src/Banking.Gateway/Dockerfile
    container_name: basicbanking-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__CustomerServiceBaseUrl: http://customer-service:8080/
      Infrastructure__AccountServiceBaseUrl: http://account-service:8080/
      Infrastructure__DepositServiceBaseUrl: http://deposit-service:8080/
      Infrastructure__AuditServiceBaseUrl: http://audit-service:8080/
      Security__Authentication__ExternalApiKeys__0__Name: local-dev-client
      Security__Authentication__ExternalApiKeys__0__ApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
      Security__Authentication__InternalServices__0__Name: gateway-service
      Security__Authentication__InternalServices__0__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
      Security__CurrentServiceIdentity__ServiceName: gateway-service
      Security__CurrentServiceIdentity__ApiKey: ${GATEWAY_SERVICE_API_KEY:-gateway-service-dev-key}
    depends_on:
      customer-service:
        condition: service_started
      account-service:
        condition: service_started
      deposit-service:
        condition: service_started
      audit-service:
        condition: service_started
    ports:
      - "${GATEWAY_SERVICE_PORT:-5000}:8080"

  banking-web:
    build:
      context: ..
      dockerfile: src/Banking.Web/Dockerfile
    container_name: basicbanking-web
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_started
    ports:
      - "${BANKING_WEB_PORT:-5300}:80"

  banking-platform-ops:
    build:
      context: ..
      dockerfile: src/Banking.PlatformOps/Dockerfile
    container_name: basicbanking-platform-ops
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_started
    ports:
      - "${BANKING_PLATFORM_OPS_PORT:-5303}:80"

  banking-customer-portal:
    build:
      context: ..
      dockerfile: src/Banking.CustomerPortal/Dockerfile
    container_name: basicbanking-customer-portal
    restart: unless-stopped
    depends_on:
      banking-customer-bff:
        condition: service_started
      customer-service:
        condition: service_started
      account-service:
        condition: service_started
      deposit-service:
        condition: service_started
      audit-service:
        condition: service_started
    ports:
      - "${BANKING_CUSTOMER_PORTAL_PORT:-5301}:80"

  banking-customer-bff:
    build:
      context: ..
      dockerfile: src/Banking.Bff.CustomerPortal/Dockerfile
    container_name: basicbanking-customer-bff
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__CustomerServiceBaseUrl: http://customer-service:8080/
      Infrastructure__AccountServiceBaseUrl: http://account-service:8080/
      Infrastructure__DepositServiceBaseUrl: http://deposit-service:8080/
      Infrastructure__ExternalApiKey: ${LOCAL_DEV_API_KEY:-local-dev-api-key}
    depends_on:
      customer-service:
        condition: service_started
      account-service:
        condition: service_started
      deposit-service:
        condition: service_started
    ports:
      - "${BANKING_CUSTOMER_BFF_PORT:-5302}:8080"

volumes:
  postgres-data:
  rabbitmq-data:
