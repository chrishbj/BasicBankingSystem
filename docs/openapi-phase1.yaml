            application/json:
              schema:
                $ref: '#/components/schemas/DepositPagedResponse'
        '429':
          description: Request rate exceeded
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
