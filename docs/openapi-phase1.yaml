        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: correlationId
          in: query
          required: false
          schema:
            type: string
        - name: failureCode
          in: query
          required: false
          schema:
            type: string
        - name: requestedFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: requestedTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
