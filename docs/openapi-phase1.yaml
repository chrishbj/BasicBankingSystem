  /api/v1/deposits:
    post:
      tags: [Deposits]
      summary: Create deposit request
      description: |
        Creates an idempotent deposit request.

        Repeating the same request with the same `Idempotency-Key` replays the
        original logical deposit result instead of creating a new financial effect.
        Repeated short-window replays may be progressively delayed and can return
        replay metadata headers.
      security:
        - externalApiKey: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepositRequest'
      responses:
        '202':
          description: Deposit accepted
          headers:
            X-Idempotent-Replay:
              $ref: '#/components/headers/IdempotentReplay'
            X-Idempotency-Replay-Attempt:
              $ref: '#/components/headers/IdempotencyReplayAttempt'
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deposit'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Customer or account not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Deposit conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Request rate exceeded
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    get:
      tags: [Deposits]
      summary: Search deposits
      security:
        - externalApiKey: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/DepositStatus'
        - name: customerId
