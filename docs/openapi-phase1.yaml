openapi: 3.1.0
info:
  title: BasicBankingSystem Phase 1 Service APIs
  version: 1.0.0
  description: |
    Phase 1 API contract for the public backend service APIs in BasicBankingSystem.
    This document intentionally covers the documented service endpoints only.
    Gateway routes, Customer Portal BFF routes, demo endpoints, and internal-only service
    operations are protected by integration tests unless they are explicitly added here.
    The platform applies shared request-rate protection to all endpoints and
    replay-aware protection to idempotent write operations that use
    `Idempotency-Key`.
servers:
  - url: http://localhost:8080
    description: Local gateway
tags:
  - name: Customers
  - name: Accounts
  - name: Deposits
  - name: Audits
  - name: Platform
components:
  securitySchemes:
    externalApiKey:
      type: apiKey
      in: header
      name: X-Api-Key
  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 100
    PageNumber:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
  headers:
    CorrelationIdResponse:
      description: Correlation identifier for the request.
      schema:
        type: string
    RetryAfter:
      description: Number of seconds the caller should wait before retrying.
      schema:
        type: string
    IdempotentReplay:
      description: Indicates the response is a replay of an earlier idempotent write.
      schema:
        type: string
        enum: ['true']
    IdempotencyReplayAttempt:
      description: Indicates which replay attempt was observed for the same idempotent write.
      schema:
        type: string
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: [string, "null"]
        title:
          type: string
        status:
          type: integer
        code:
          type: [string, "null"]
        detail:
          type: [string, "null"]
        traceId:
          type: [string, "null"]
        correlationId:
          type: [string, "null"]
        errors:
          type: [object, "null"]
          additionalProperties:
            type: array
            items:
              type: string
    Address:
      type: object
      required: [country, province, city, line1, postalCode]
      properties:
        country:
          type: string
          maxLength: 2
        province:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        line1:
          type: string
          maxLength: 200
        postalCode:
          type: string
          maxLength: 20
    CustomerStatus:
      type: string
      enum: [Pending, Active, Frozen, Closed]
    AccountStatus:
      type: string
      enum: [Active, Frozen, Closed]
    AccountPostingType:
      type: string
      enum: [DepositCredit, DepositReversal, WithdrawalDebit]
    DepositStatus:
      type: string
      enum: [Received, Processing, Succeeded, Rejected, Failed, PendingReview]
    Channel:
      type: string
      enum: [Counter, Online, Atm, Batch]
    DepositSagaStepStatus:
      type: string
      enum: [NotStarted, InProgress, Succeeded, Failed, Compensated, Skipped]
    DepositReviewResolution:
      type: string
      enum: [None, RetryRequested, ReversedExternally, FailedExternally]
    PendingReviewSortBy:
      type: string
      enum: [ReviewRequiredAt, LastCompensationAttemptAt, RequestedAt]
    CreateCustomerRequest:
      type: object
      required: [fullName, identityType, identityNumber, mobile, address, riskLevel]
      properties:
        fullName:
          type: string
          maxLength: 200
        identityType:
          type: string
          maxLength: 50
        identityNumber:
          type: string
          maxLength: 50
        mobile:
          type: string
          maxLength: 30
        email:
          type: [string, "null"]
          format: email
        address:
          $ref: '#/components/schemas/Address'
        riskLevel:
          type: string
          maxLength: 30
    CustomerPortalSignInRequest:
      type: object
      required: [customerNumber, identityLast4]
      properties:
        customerNumber:
          type: string
        identityLast4:
          type: string
          minLength: 4
          maxLength: 4
    Customer:
      type: object
      required: [customerId, customerNumber, fullName, identityType, identityNumberMasked, portalIdentityLast4, mobile, address, riskLevel, status, createdAt, updatedAt]
      properties:
        customerId:
          type: string
        customerNumber:
          type: string
        fullName:
          type: string
        identityType:
          type: string
        identityNumberMasked:
          type: string
        portalIdentityLast4:
          type: string
        mobile:
          type: string
        email:
          type: [string, "null"]
          format: email
        address:
          $ref: '#/components/schemas/Address'
        riskLevel:
          type: string
        status:
          $ref: '#/components/schemas/CustomerStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CustomerSummary:
      type: object
      required: [customerId, customerNumber, fullName, identityNumberMasked, portalIdentityLast4, mobile, status, createdAt]
      properties:
        customerId:
          type: string
        customerNumber:
          type: string
        fullName:
          type: string
        identityNumberMasked:
          type: string
        portalIdentityLast4:
          type: string
        mobile:
          type: string
        status:
          $ref: '#/components/schemas/CustomerStatus'
        createdAt:
          type: string
          format: date-time
    CustomerPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerSummary'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    ChangeCustomerStatusRequest:
      type: object
      required: [targetStatus, reason]
      properties:
        targetStatus:
          $ref: '#/components/schemas/CustomerStatus'
        reason:
          type: string
          maxLength: 500
    ChangeCustomerStatusResponse:
      type: object
      required: [customerId, previousStatus, currentStatus, effectiveAt]
      properties:
        customerId:
          type: string
        previousStatus:
          $ref: '#/components/schemas/CustomerStatus'
        currentStatus:
          $ref: '#/components/schemas/CustomerStatus'
        effectiveAt:
          type: string
          format: date-time
    OpenAccountRequest:
      type: object
      required: [customerId, accountType, currency]
      properties:
        customerId:
          type: string
        accountType:
          type: string
          maxLength: 30
        currency:
          type: string
          minLength: 3
          maxLength: 3
    CreateWithdrawalRequest:
      type: object
      required: [amount, currency, referenceNumber]
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        referenceNumber:
          type: string
          minLength: 1
          maxLength: 100
        correlationId:
          type: [string, "null"]
        note:
          type: [string, "null"]
          maxLength: 500
    Account:
      type: object
      required: [accountId, accountNumber, customerId, accountType, currency, status, availableBalance, ledgerBalance, openedAt]
      properties:
        accountId:
          type: string
        accountNumber:
          type: string
        customerId:
          type: string
        accountType:
          type: string
        currency:
          type: string
        status:
          $ref: '#/components/schemas/AccountStatus'
        availableBalance:
          type: number
        ledgerBalance:
          type: number
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: [string, "null"]
          format: date-time
    AccountSummary:
      type: object
      required: [accountId, accountNumber, accountType, currency, status, availableBalance, ledgerBalance]
      properties:
        accountId:
          type: string
        accountNumber:
          type: string
        accountType:
          type: string
        currency:
          type: string
        status:
          $ref: '#/components/schemas/AccountStatus'
        availableBalance:
          type: number
        ledgerBalance:
          type: number
    AccountPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountSummary'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    AccountActivity:
      type: object
      required: [postingReference, accountId, postingType, amount, currency, createdAt]
      properties:
        postingReference:
          type: string
        accountId:
          type: string
        postingType:
          $ref: '#/components/schemas/AccountPostingType'
        amount:
          type: number
        currency:
          type: string
        correlationId:
          type: [string, "null"]
        reversalOfPostingReference:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
    AccountActivityPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountActivity'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    CreateDepositRequest:
      type: object
      required: [customerId, accountId, amount, currency, channel]
      properties:
        customerId:
          type: string
        accountId:
          type: string
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        channel:
          $ref: '#/components/schemas/Channel'
        referenceNumber:
          type: [string, "null"]
          maxLength: 100
        note:
          type: [string, "null"]
          maxLength: 500
    Deposit:
      type: object
      required: [transactionId, transactionNumber, customerId, accountId, amount, currency, channel, status, accountPostingStatus, auditStatus, compensationStatus, reviewResolution, correlationId, compensationRetryCount, requestedAt]
      properties:
        transactionId:
          type: string
        transactionNumber:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        amount:
          type: number
        currency:
          type: string
        referenceNumber:
          type: [string, "null"]
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/DepositStatus'
        accountPostingStatus:
          $ref: '#/components/schemas/DepositSagaStepStatus'
        auditStatus:
          $ref: '#/components/schemas/DepositSagaStepStatus'
        compensationStatus:
          $ref: '#/components/schemas/DepositSagaStepStatus'
        reviewResolution:
          $ref: '#/components/schemas/DepositReviewResolution'
        correlationId:
          type: string
        failureCode:
          type: [string, "null"]
        failureReason:
          type: [string, "null"]
        compensationRetryCount:
          type: integer
        reviewLastActionBy:
          type: [string, "null"]
        reviewNote:
          type: [string, "null"]
        requestedAt:
          type: string
          format: date-time
        postedAt:
          type: [string, "null"]
          format: date-time
        reversedAt:
          type: [string, "null"]
          format: date-time
        reviewRequiredAt:
          type: [string, "null"]
          format: date-time
        reviewResolvedAt:
          type: [string, "null"]
          format: date-time
        lastCompensationAttemptAt:
          type: [string, "null"]
          format: date-time
        lastProcessedAt:
          type: [string, "null"]
          format: date-time
    DepositSummary:
      type: object
      required: [transactionId, transactionNumber, customerId, accountId, amount, currency, channel, status, requestedAt]
      properties:
        transactionId:
          type: string
        transactionNumber:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        amount:
          type: number
        currency:
          type: string
        referenceNumber:
          type: [string, "null"]
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/DepositStatus'
        requestedAt:
          type: string
          format: date-time
        postedAt:
          type: [string, "null"]
          format: date-time
    DepositPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DepositSummary'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    PendingReviewDepositSummary:
      type: object
      required: [transactionId, transactionNumber, customerId, accountId, accountNumber, amount, currency, compensationStatus, reviewResolution, compensationRetryCount, requestedAt]
      properties:
        transactionId:
          type: string
        transactionNumber:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        accountNumber:
          type: string
        amount:
          type: number
        currency:
          type: string
        compensationStatus:
          $ref: '#/components/schemas/DepositSagaStepStatus'
        reviewResolution:
          $ref: '#/components/schemas/DepositReviewResolution'
        failureCode:
          type: [string, "null"]
        failureReason:
          type: [string, "null"]
        compensationRetryCount:
          type: integer
        reviewLastActionBy:
          type: [string, "null"]
        reviewNote:
          type: [string, "null"]
        requestedAt:
          type: string
          format: date-time
        reviewRequiredAt:
          type: [string, "null"]
          format: date-time
        lastCompensationAttemptAt:
          type: [string, "null"]
          format: date-time
        lastProcessedAt:
          type: [string, "null"]
          format: date-time
    PendingReviewDepositPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PendingReviewDepositSummary'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    RetryDepositReviewRequest:
      type: object
      properties:
        operatorId:
          type: [string, "null"]
        note:
          type: [string, "null"]
    ResolveDepositReviewRequest:
      type: object
      required: [resolution, operatorId, note]
      properties:
        resolution:
          $ref: '#/components/schemas/DepositReviewResolution'
        operatorId:
          type: string
        note:
          type: string
    AuditSummary:
      type: object
      required: [auditId, actorType, actorId, action, aggregateType, aggregateId, correlationId, occurredAt]
      properties:
        auditId:
          type: string
        actorType:
          type: string
        actorId:
          type: string
        action:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
        correlationId:
          type: string
        occurredAt:
          type: string
          format: date-time
    AuditDetail:
      allOf:
        - $ref: '#/components/schemas/AuditSummary'
        - type: object
          required: [beforeSnapshot, afterSnapshot, causationId]
          properties:
            beforeSnapshot:
              type: [object, "null"]
              additionalProperties: true
            afterSnapshot:
              type: [object, "null"]
              additionalProperties: true
            causationId:
              type: [string, "null"]
    AuditPagedResponse:
      type: object
      required: [items, pageNumber, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditSummary'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [status, dependencies]
      properties:
        status:
          type: string
        dependencies:
          type: object
          additionalProperties:
            type: string
    PlatformServiceStatus:
      type: object
      required: [name, basePath, health, swaggerUrl, openApiUrl]
      properties:
        name:
          type: string
        basePath:
          type: string
        health:
          type: string
        statusCode:
          type: [integer, "null"]
        swaggerUrl:
          type: string
        openApiUrl:
          type: string
    PlatformDependencyStatus:
      type: object
      required: [name, status, checkedBy]
      properties:
        name:
          type: string
        status:
          type: string
        checkedBy:
          type: string
    DepositPendingReviewItem:
      type: object
      required: [transactionId, transactionNumber, customerId, accountId, accountNumber, amount, currency, compensationStatus, reviewResolution, compensationRetryCount, requestedAt]
      properties:
        transactionId:
          type: string
        transactionNumber:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        accountNumber:
          type: string
        amount:
          type: number
        currency:
          type: string
        compensationStatus:
          type: string
        reviewResolution:
          type: string
        failureCode:
          type: [string, "null"]
        failureReason:
          type: [string, "null"]
        compensationRetryCount:
          type: integer
        reviewLastActionBy:
          type: [string, "null"]
        reviewNote:
          type: [string, "null"]
        requestedAt:
          type: string
          format: date-time
        reviewRequiredAt:
          type: [string, "null"]
          format: date-time
        lastCompensationAttemptAt:
          type: [string, "null"]
          format: date-time
        lastProcessedAt:
          type: [string, "null"]
          format: date-time
    DepositWorkflowSummary:
      type: object
      required: [checkedAt, receivedCount, succeededCount, failedCount, pendingReviewCount, pendingReviewItems]
      properties:
        checkedAt:
          type: string
          format: date-time
        receivedCount:
          type: integer
        succeededCount:
          type: integer
        failedCount:
          type: integer
        pendingReviewCount:
          type: integer
        pendingReviewItems:
          type: array
          items:
            $ref: '#/components/schemas/DepositPendingReviewItem'
    DepositOutboxMessageItem:
      type: object
      required: [messageId, transactionId, messageType, occurredAt]
      properties:
        messageId:
          type: string
        transactionId:
          type: string
        messageType:
          type: string
        occurredAt:
          type: string
          format: date-time
        processedAt:
          type: [string, "null"]
          format: date-time
        lastError:
          type: [string, "null"]
    DepositWorkerRuntimeStatus:
      type: object
      required: [workerName, mode, enabled, pollingIntervalMilliseconds, backlogCount, notes]
      properties:
        workerName:
          type: string
        mode:
          type: string
        enabled:
          type: boolean
        pollingIntervalMilliseconds:
          type: integer
        backlogCount:
          type: integer
        notes:
          type: string
    DepositRuntimeStatus:
      type: object
      required: [checkedAt, messageTransport, pendingReviewCount, pendingOutboxCount, workers]
      properties:
        checkedAt:
          type: string
          format: date-time
        messageTransport:
          type: string
        pendingReviewCount:
          type: integer
        pendingOutboxCount:
          type: integer
        workers:
          type: array
          items:
            $ref: '#/components/schemas/DepositWorkerRuntimeStatus'
    DepositWorkflowDetail:
      type: object
      required: [transactionId, transactionNumber, customerId, accountId, amount, currency, channel, status, accountPostingStatus, auditStatus, compensationStatus, reviewResolution, correlationId, compensationRetryCount, requestedAt]
      properties:
        transactionId:
          type: string
        transactionNumber:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        amount:
          type: number
        currency:
          type: string
        referenceNumber:
          type: [string, "null"]
        channel:
          type: string
        status:
          type: string
        accountPostingStatus:
          type: string
        auditStatus:
          type: string
        compensationStatus:
          type: string
        reviewResolution:
          type: string
        correlationId:
          type: string
        failureCode:
          type: [string, "null"]
        failureReason:
          type: [string, "null"]
        compensationRetryCount:
          type: integer
        reviewLastActionBy:
          type: [string, "null"]
        reviewNote:
          type: [string, "null"]
        requestedAt:
          type: string
          format: date-time
        postedAt:
          type: [string, "null"]
          format: date-time
        reversedAt:
          type: [string, "null"]
          format: date-time
        reviewRequiredAt:
          type: [string, "null"]
          format: date-time
        reviewResolvedAt:
          type: [string, "null"]
          format: date-time
        lastCompensationAttemptAt:
          type: [string, "null"]
          format: date-time
        lastProcessedAt:
          type: [string, "null"]
          format: date-time
    AuditTraceItem:
      type: object
      required: [auditId, actorType, actorId, action, aggregateType, aggregateId, correlationId, occurredAt]
      properties:
        auditId:
          type: string
        actorType:
          type: string
        actorId:
          type: string
        action:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
        correlationId:
          type: string
        occurredAt:
          type: string
          format: date-time
    CorrelationDiagnostics:
      type: object
      required: [correlationId, checkedAt, deposits, auditEvents]
      properties:
        correlationId:
          type: string
        checkedAt:
          type: string
          format: date-time
        deposits:
          type: array
          items:
            $ref: '#/components/schemas/DepositWorkflowDetail'
        auditEvents:
          type: array
          items:
            $ref: '#/components/schemas/AuditTraceItem'
    RetryDepositCompensationRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500
    PlatformResolveDepositReviewRequest:
      type: object
      required: [resolution, reason]
      properties:
        resolution:
          type: string
          enum: [ReversedExternally, FailedExternally]
        reason:
          type: string
          maxLength: 500
    RequeueOutboxMessageRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500
    PlatformMaintenanceAction:
      type: object
      required: [operationId, actionType, targetType, targetId, actorId, resultStatus, downstreamStatusCode, reason, occurredAt]
      properties:
        operationId:
          type: string
        actionType:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        actorId:
          type: string
        resultStatus:
          type: string
        downstreamStatusCode:
          type: integer
        reason:
          type: string
        occurredAt:
          type: string
          format: date-time
    PlatformOverview:
      type: object
      required: [platform, checkedAt, services, dependencies, deposits, depositRuntime]
      properties:
        platform:
          type: string
        checkedAt:
          type: string
          format: date-time
        services:
          type: array
          items:
            $ref: '#/components/schemas/PlatformServiceStatus'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/PlatformDependencyStatus'
        deposits:
          $ref: '#/components/schemas/DepositWorkflowSummary'
        depositRuntime:
          $ref: '#/components/schemas/DepositRuntimeStatus'
paths:
  /api/v1/customers:
    post:
      tags: [Customers]
      summary: Create a customer
      security:
        - externalApiKey: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Duplicate identity or mobile
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    get:
      tags: [Customers]
      summary: List customers
      security:
        - externalApiKey: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
